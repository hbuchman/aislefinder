<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AisleFinder — #48c</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; background: #f4f6f5; color: #1c2b22; }
  header { padding: 28px 32px 10px; }
  h1 { margin: 0 0 4px; font-size: 22px; }
  header p { margin: 0; color: #5c6b62; font-size: 14px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: #157a40; margin: 28px 32px 0; }
  .row { display: grid; grid-template-columns: repeat(2, 240px); gap: 24px; padding: 14px 32px; }
  .card { background: #fff; border: 1px solid #e2e8e4; border-radius: 14px; padding: 24px 16px 16px; text-align: center; }
  body.dark .card { background: #16211a; border-color: #24352b; }
  .card svg { width: 170px; height: 170px; }
  .card h3 { font-size: 13px; margin: 10px 0 3px; font-weight: 600; }
  body.dark .card h3 { color: #e8f2ec; }
  .card p { font-size: 11px; color: #6b7a70; margin: 0; line-height: 1.4; }
  body.dark .card p { color: #8fa396; }
  .num { display: inline-block; font-size: 10px; font-weight: 700; color: #fff; background: #229955; border-radius: 999px; padding: 1px 7px; margin-bottom: 8px; }
  .highlight { border-color: #229955 !important; border-width: 2px !important; }
  .toggle { position: fixed; top: 22px; right: 28px; font-size: 13px; user-select: none; cursor: pointer; background: #fff; border: 1px solid #dbe3de; border-radius: 999px; padding: 6px 12px; }
  body.dark { background: #0d1510; color: #dfe9e3; }
  body.dark .card { background: #16211a; border-color: #24352b; }
  body.dark .toggle { background: #16211a; border-color: #2a3d31; color: #dfe9e3; }
</style>
</head>
<body>
<label class="toggle"><input type="checkbox" onchange="document.body.classList.toggle('dark', this.checked)"> dark background</label>
<header>
  <h1>#48b vs #48c</h1>
  <p>Left: gold path + pin. Right: shorter gold shelf, path and pin in mint.</p>
</header>

<h2>Side by side</h2>
<div class="row">

<!-- 48b: original for comparison -->
<div class="card">
<svg viewBox="0 0 64 64">
  <path d="M4 58 L28 12 L32 12 L14 58 Z" fill="#1a9c4e"/>
  <path d="M60 58 L36 12 L32 12 L50 58 Z" fill="#157a40"/>
  <path d="M21 40 L30 40" stroke="#f5a623" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M32 54 C28 44 36 33 32 22" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-dasharray="1.5 7" stroke-linecap="round"/>
  <path d="M32 5 c4.2 0 6.8 3.1 6.8 6.5 C38.8 17 32 22 32 22 S25.2 17 25.2 11.5 C25.2 8.1 27.8 5 32 5 Z" fill="#f5a623"/>
  <circle cx="32" cy="11" r="2.5" fill="#fff"/>
</svg>
<h3><span class="num">48b</span> all gold</h3>
<p>Shelf, path, and pin all in amber — for comparison.</p>
</div>

<!-- 48c: shorter gold shelf, mint path + pin -->
<div class="card highlight">
<svg viewBox="0 0 64 64">
  <path d="M4 58 L28 12 L32 12 L14 58 Z" fill="#1a9c4e"/>
  <path d="M60 58 L36 12 L32 12 L50 58 Z" fill="#157a40"/>
  <!-- shorter gold shelf -->
  <path d="M21 40 L26 40" stroke="#f5a623" stroke-width="3.5" stroke-linecap="round"/>
  <!-- curved dashed route in mint -->
  <path d="M32 54 C28 44 36 33 32 22" fill="none" stroke="#aaf0ce" stroke-width="2.5" stroke-dasharray="1.5 7" stroke-linecap="round"/>
  <!-- pin in mint -->
  <path d="M32 5 c4.2 0 6.8 3.1 6.8 6.5 C38.8 17 32 22 32 22 S25.2 17 25.2 11.5 C25.2 8.1 27.8 5 32 5 Z" fill="#aaf0ce"/>
  <circle cx="32" cy="11" r="2.5" fill="#157a40"/>
</svg>
<h3><span class="num">48c</span> gold shelf, mint path + pin ✦</h3>
<p>Shorter gold shelf marks the spot; path and pin in mint keep them visually secondary.</p>
</div>

</div>
<div style="height:48px"></div>
</body>
</html>
