<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 500px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #157a40 0%, #1a9c4e 55%, #229955 100%);
    display: flex; align-items: center; justify-content: center; gap: 64px;
    color: #fff;
  }
  .tile {
    width: 240px; height: 240px; border-radius: 56px; background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
  }
  .tile svg { width: 160px; height: 160px; }
  h1 { font-size: 76px; font-weight: 800; letter-spacing: -1.5px; }
  h1 .find { color: #f5b041; }
  p { font-size: 30px; margin-top: 14px; opacity: 0.95; font-weight: 500; }
</style>
</head>
<body>
  <div class="tile">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="afLogoLegs" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#229955"/>
          <stop offset="1" stop-color="#157a40"/>
        </linearGradient>
        <linearGradient id="afLogoShelf" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#2ecc71"/>
          <stop offset="1" stop-color="#1a9c4e"/>
        </linearGradient>
      </defs>
      <path d="M6 58 L24 6 h9 L18 58 z" fill="url(#afLogoLegs)"/>
      <path d="M58 58 L40 6 h-9 L46 58 z" fill="url(#afLogoLegs)"/>
      <rect x="19" y="38" width="26" height="7" rx="3.5" fill="url(#afLogoShelf)"/>
      <path d="M27 27l4 4 7-8" fill="none" stroke="#27ae60" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="6" y="60" width="16" height="3.5" rx="1.75" fill="#95a5a6" opacity="0.4"/>
      <rect x="42" y="60" width="16" height="3.5" rx="1.75" fill="#95a5a6" opacity="0.4"/>
    </svg>
  </div>
  <div>
    <h1>Aisle<span class="find">Finder</span></h1>
    <p>Your grocery list, sorted aisle by aisle.</p>
  </div>
</body>
</html>
